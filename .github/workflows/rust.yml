name: Rust Manual Release (Auto Notes)

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - uses: actions/checkout@v4

      # 🦀 Setup Rust
      - uses: dtolnay/rust-toolchain@stable

      # 🔍 Extract metadata (robust)
      - name: Extract Cargo metadata
        id: meta
        run: |
          METADATA=$(cargo metadata --no-deps --format-version 1)
          NAME=$(echo $METADATA | jq -r '.packages[0].name')
          VERSION=$(echo $METADATA | jq -r '.packages[0].version')

          ARCH=$(uname -m)
          OS=linux

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "arch=$ARCH" >> $GITHUB_OUTPUT
          echo "os=$OS" >> $GITHUB_OUTPUT

      # 🏗️ Build
      - name: Build release
        run: cargo build --release --locked

      # 📦 Package binary
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/${{ steps.meta.outputs.name }} dist/
          cd dist
          tar -czvf ${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.os }}-${{ steps.meta.outputs.arch }}.tar.gz ${{ steps.meta.outputs.name }}

      # 🧾 Generate Release Notes
      - name: Generate Release Notes
        id: notes
        run: |
          cat <<EOF > release.md
## ${{ steps.meta.outputs.name }} v${{ steps.meta.outputs.version }} 🚀

### 🖥️ Build Info
- OS: ${{ steps.meta.outputs.os }}
- Architecture: ${{ steps.meta.outputs.arch }}
- Rust: stable

---

### ✨ What's New
- Automated release generated from Cargo.toml
- Optimized release build
- Linux binary packaging

---

### 📦 Download
\`\`\`
${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.os }}-${{ steps.meta.outputs.arch }}.tar.gz
\`\`\`

---

### 🔐 Notes
- Built using \`cargo build --release\`
- Compatible with modern Linux distributions
- No manual steps required

EOF

      # 🚀 Create Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }} v${{ steps.meta.outputs.version }}
          body_path: release.md
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
