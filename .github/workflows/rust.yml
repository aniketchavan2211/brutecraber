name: Rust Manual CI/CD (Auto Version)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # Setup Rust
      - uses: dtolnay/rust-toolchain@stable

      # Extract version + name from Cargo.toml
      - name: Extract Cargo metadata
        id: cargo
        run: |
          NAME=$(grep '^name =' Cargo.toml | head -n1 | cut -d '"' -f2)
          VERSION=$(grep '^version =' Cargo.toml | head -n1 | cut -d '"' -f2)

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      # Build release
      - name: Build
        run: cargo build --release

      # Upload artifact
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.cargo.outputs.name }}-linux
          path: target/release/${{ steps.cargo.outputs.name }}

      # Create release using extracted version
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.cargo.outputs.tag }}
          name: ${{ steps.cargo.outputs.name }} ${{ steps.cargo.outputs.tag }}
          files: target/release/${{ steps.cargo.outputs.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
